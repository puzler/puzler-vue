#import "../../fragments/PuzzleAdminFields.graphql"

mutation PublishPuzzleVersion($puzzleId: ID!, $versionId: ID!, $visibility: PuzzleVisibilityEnum) {
  publishPuzzleVersion(input: { puzzleId: $puzzleId, versionId: $versionId, visibility: $visibility }) {
    puzzle {
      ...PuzzleAdminFields
    }
    errors
  }
}
