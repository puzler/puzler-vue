#import "../../fragments/PageInfoFields.graphql"

query Puzzles($filter: ListingFilterInput) {
  puzzles(filter: $filter) {
    nodes {
      id
      title
      constraintTypes
      avgRating
      effectiveDifficulty
      solveCount
      featured
      grid {
        rows
        cols
      }
      authorName
      author {
        id
        username
        displayName
        setterTier
      }
    }
    pageInfo {
      ...PageInfoFields
    }
  }
}
