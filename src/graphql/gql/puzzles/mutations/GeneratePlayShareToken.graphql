mutation GeneratePlayShareToken($puzzlePlayId: ID, $puzzleId: ID, $seed: JSON, $singleUse: Boolean) {
  generatePlayShareToken(
    input: { puzzlePlayId: $puzzlePlayId, puzzleId: $puzzleId, seed: $seed, singleUse: $singleUse }
  ) {
    puzzlePlay {
      id
    }
    shareToken {
      id
      token
      singleUse
      consumed
    }
    errors
  }
}
