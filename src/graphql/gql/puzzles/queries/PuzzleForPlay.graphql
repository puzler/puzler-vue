query PuzzleForPlay($id: ID!) {
  puzzle(id: $id) {
    id
    title
    authorName
    isFavorited
    favoriteCount
    myRating {
      stars
      difficultyVote
    }
    author {
      id
      username
      displayName
    }
    publishedVersion {
      id
      definition
      solutionHash
    }
  }
}
