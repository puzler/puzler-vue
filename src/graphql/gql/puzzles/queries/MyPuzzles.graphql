#import "../../fragments/PageInfoFields.graphql"

query MyPuzzles($filter: ListingFilterInput, $status: PuzzleStatusEnum) {
  myPuzzles(filter: $filter, status: $status) {
    nodes {
      id
      title
      status
      visibility
      shareToken
      avgRating
      solveCount
      folder {
        id
        name
      }
      publishedVersion {
        id
        displayName
      }
    }
    pageInfo {
      ...PageInfoFields
    }
  }
}
