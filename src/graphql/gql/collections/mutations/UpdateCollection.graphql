mutation UpdateCollection($id: ID!, $title: String, $description: String, $visibility: CollectionVisibilityEnum, $mode: CollectionModeEnum, $timed: Boolean) {
  updateCollection(
    input: { id: $id, attrs: { title: $title, description: $description, visibility: $visibility, mode: $mode, timed: $timed } }
  ) {
    collection {
      id
      title
      description
      visibility
      mode
      timed
    }
    errors
  }
}
