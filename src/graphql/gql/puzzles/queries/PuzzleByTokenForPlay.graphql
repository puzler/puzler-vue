query PuzzleByTokenForPlay($token: String!) {
  puzzleByToken(token: $token) {
    id
    title
    authorName
    myRating {
      stars
      difficultyVote
    }
    author {
      id
      username
      displayName
    }
    publishedVersion {
      id
      definition
      solutionHash
    }
  }
}
