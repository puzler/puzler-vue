#import "./UserThemeFields.graphql"

fragment UserFields on User {
  id
  email
  username
  displayName
  avatarUrl
  bio
  role
  passwordSet
  profileVisibility {
    solveHistory
    stats
    favorites
    subscriptions
    activity
  }
  puzzlePreferences {
    includeSolutionInSudokupadExport
    commentsRequireSolveDefault
  }
  playerSettings
  colorPalette
  activeThemeId
  enableCustomStyles
  userThemes {
    ...UserThemeFields
  }
  oauthConnections {
    provider
    createdAt
  }
}
